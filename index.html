<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FKF - Solusi Lapar Anak FKIP</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body { 
    font-family: 'Plus Jakarta Sans', sans-serif; 
    background-color: #FFF9F2;
    color: #333;
}

.bg-hero-doodle {
    background-color: #FFF8E1;
    /* Memperbaiki SVG yang terpotong menjadi pola polka dot halus */
    background-image: 
        url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='2' cy='2' r='2' fill='%23f59e0b' fill-opacity='0.15'/%3E%3C/svg%3E"),
        linear-gradient(135deg, rgba(255,248,225,0.95), rgba(255,213,79,0.85), rgba(215,168,110,0.8));
}

.rounded-custom { border-radius: 24px; }
.hidden { display: none !important; }
.btn-hover:active { transform: scale(0.95); transition: transform 0.1s; }
.text-chocolate { color: #5D4037; }
</style>
</head>

<body class="max-w-md mx-auto relative min-h-screen">

<section id="page-home" class="min-h-screen flex flex-col justify-center">

    <div class="bg-hero-doodle p-8 text-center text-chocolate h-full flex flex-col justify-center rounded-b-3xl shadow-md">

        <h1 class="text-3xl font-extrabold mb-2">Solusi Lapar Anak FKIP</h1>
        <p class="text-sm italic mb-4">Murah, Enak, Diantar ke Kos 🚚</p>

        <p class="text-sm font-bold text-red-600 mb-1">
            🔥 Sisa hari ini: <span id="total-stock">--</span> / 30
        </p>

        <p class="text-xs mb-6">⭐ 120+ mahasiswa sudah order minggu ini</p>

        <div class="bg-orange-500 text-white p-4 rounded-xl mb-6 shadow-lg">
            <p class="text-xs font-semibold mb-1">PO Ditutup Jam 20.00</p>
            <p id="countdown" class="text-3xl font-extrabold tracking-widest">00:00:00</p>
        </div>

        <button onclick="startOrder('ready')" class="bg-white text-orange-600 p-4 w-full rounded-xl font-bold mb-3 shadow-md btn-hover">
            🔥 Pesan Sekarang (Sebelum Habis)
        </button>

        <button onclick="startOrder('po')" class="bg-yellow-600 text-white p-4 w-full rounded-xl font-bold shadow-md btn-hover">
            Pre-Order Besok ⏳
        </button>

    </div>

</section>

<section id="page-menu" class="hidden p-6 pb-24">

    <button onclick="showPage('page-home')" class="text-orange-600 font-bold mb-6 flex items-center gap-2 btn-hover">
        ← Kembali
    </button>

    <h2 class="text-2xl font-extrabold text-chocolate mb-4">Pilih Menu</h2>
    
    <div id="menu-list" class="space-y-3"></div>

    <div id="cart-bar" class="fixed bottom-0 left-0 right-0 bg-white p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] hidden max-w-md mx-auto rounded-t-2xl flex justify-between items-center">
        <div>
            <p class="text-xs text-gray-500 font-semibold">Total Pesanan</p>
            <p class="text-lg font-extrabold text-orange-600">Rp <span id="total-price">0</span></p>
        </div>
        <button onclick="goToPayment()" class="bg-orange-500 text-white px-6 py-3 rounded-xl font-bold btn-hover">
            Lanjut Bayar
        </button>
    </div>

</section>

<section id="page-payment" class="hidden p-6">

    <button onclick="showPage('page-menu')" class="text-orange-600 font-bold mb-6 flex items-center gap-2 btn-hover">
        ← Kembali ke Menu
    </button>

    <h2 class="text-2xl font-extrabold text-chocolate mb-6">Pilih Metode Pembayaran</h2>

    <div class="bg-white p-4 rounded-xl shadow-sm mb-6 flex items-center gap-3">
        <input type="checkbox" id="member-check" class="w-5 h-5 text-orange-500 focus:ring-orange-500 border-gray-300 rounded">
        <label for="member-check" class="font-semibold text-gray-700">Saya Member FKIP (Min. 10k)</label>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <button onclick="finalOrder('COD')" class="bg-blue-600 text-white p-4 rounded-xl font-bold shadow-md btn-hover">
            Bayar COD 💵
        </button>
        <button onclick="finalOrder('Transfer')" class="bg-green-600 text-white p-4 rounded-xl font-bold shadow-md btn-hover">
            Transfer Bank 💳
        </button>
    </div>

</section>

<script>

const menu = [
    {id:1, n:"Lumpia Balado", p:5000},
    {id:2, n:"Tahu Bakso", p:10000},
    {id:3, n:"Cilok", p:5000}
];

let cart = {};
let orderType = "";

const stok = {1:10, 2:10, 3:10};

function showPage(id){
    document.querySelectorAll("section").forEach(s => s.classList.add("hidden"));
    document.getElementById(id).classList.remove("hidden");
}

function startOrder(type){
    if(new Date().getHours() >= 20){
        alert("Mohon maaf, PO untuk hari ini sudah ditutup.");
        return;
    }
    orderType = type;
    renderMenu();
    showPage("page-menu");
}

function renderMenu(){
    let html = "";
    menu.forEach(m => {
        // Penambahan styling pada list menu agar lebih menarik
        html += `
        <div class="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center">
            <div>
                <h3 class="font-bold text-gray-800">${m.n}</h3>
                <p class="text-sm font-semibold text-orange-500">Rp${m.p.toLocaleString('id-ID')}</p>
            </div>
            <button onclick="add(${m.id})" class="bg-orange-100 text-orange-600 w-10 h-10 rounded-full font-extrabold text-xl btn-hover flex items-center justify-center">
                +
            </button>
        </div>`;
    });
    document.getElementById("menu-list").innerHTML = html;
}

function add(id){
    if(stok[id] <= 0) return alert("Maaf, stok item ini sudah habis!");
    cart[id] = (cart[id] || 0) + 1;
    stok[id]--;
    updateTotal();
    updateCart();
}

function updateCart(){
    let total = 0;
    for(let id in cart){
        let item = menu.find(m => m.id == id);
        total += item.p * cart[id];
    }
    document.getElementById("total-price").innerText = total.toLocaleString('id-ID');
    document.getElementById("cart-bar").classList.remove("hidden");
}

function updateTotal(){
    let t = 0;
    for(let k in stok) t += stok[k];
    document.getElementById("total-stock").innerText = t;
}
updateTotal();

function goToPayment(){
    showPage("page-payment");
}

function finalOrder(method){
    let total = 0;
    for(let id in cart){
        let item = menu.find(m => m.id == id);
        total += item.p * cart[id];
    }

    let isMember = document.getElementById("member-check").checked;

    if(isMember && total < 10000){
        alert("Pembelian khusus member minimal Rp10.000 ya!");
        return;
    }

    let msg = `Halo, saya ingin order FKF (${orderType.toUpperCase()}) via *${method}*:\n\n`;
    for(let id in cart){
        let item = menu.find(m => m.id == id);
        msg += `- ${item.n} (x${cart[id]})\n`;
    }
    
    msg += `\nTotal: *Rp${total.toLocaleString('id-ID')}*`;
    if(isMember) msg += `\n(Saya Member FKIP)`;

    window.open("https://wa.me/6283144628727?text=" + encodeURIComponent(msg));
}

function countdown(){
    let now = new Date();
    let target = new Date();
    target.setHours(20, 0, 0);

    let diff = target - now;
    if(diff < 0) return document.getElementById("countdown").innerText = "TUTUP";

    // Format menjadi 2 digit (01:05:09 bukan 1:5:9)
    let h = String(Math.floor(diff / 3600000)).padStart(2, '0');
    let m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
    let s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');

    document.getElementById("countdown").innerText = h + ":" + m + ":" + s;
}
setInterval(countdown, 1000);

</script>

</body>
</html>
